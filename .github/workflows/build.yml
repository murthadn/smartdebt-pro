
name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: temurin }
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.19.6', channel: stable, cache: true }
      - name: Firebase config
        run: |
          mkdir -p android/app
          echo '\${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json
      - run: flutter pub get
      - name: Build APK
        run: flutter build apk --release --split-per-abi
      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk SmartDebt-Pro-arm64.apk
          mv app-armeabi-v7a-release.apk SmartDebt-Pro-arm32.apk
      - uses: actions/upload-artifact@v4
        with:
          name: SmartDebt-Pro-APK
          path: build/app/outputs/flutter-apk/SmartDebt-Pro-*.apk
          retention-days: 30
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.\${{ github.run_number }}
          name: SmartDebt Pro v1.0.\${{ github.run_number }}
          files: build/app/outputs/flutter-apk/SmartDebt-Pro-*.apk
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
